services:
  app:
    build: .
    ports:
      - "3050:3050"
    volumes:
      - flags_cache:/app/cache/flags
      - state_data:/app/data
    environment:
      - PORT=3050
      - FOOTBALL_DATA_API_KEY=${FOOTBALL_DATA_API_KEY}
      - WC_JWT_TOKEN=${WC_JWT_TOKEN}
      - AUTH_SECRET=${AUTH_SECRET:-}
      - API_FOOTBALL_KEY=${API_FOOTBALL_KEY:-}
      - TZ=Asia/Dubai
    networks:
      - default
      - web
    restart: unless-stopped

volumes:
  flags_cache:
  state_data:

# 'web' is the shared Caddy reverse-proxy network (external, created by infra stack).
# Joining it lets Caddy reach this container by name for fifa.qplc.dev.
networks:
  web:
    external: true
